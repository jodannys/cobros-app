<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      // Detectar cuando hay un nuevo SW esperando
      reg.addEventListener('updatefound', () => {
        const nuevo = reg.installing;
        nuevo.addEventListener('statechange', () => {
          if (nuevo.state === 'installed' && navigator.serviceWorker.controller) {
            mostrarBannerActualizacion();
          }
        });
      });
    });

    // Cuando el nuevo SW toma control → recargar automático
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      window.location.reload();
    });
  }

  function mostrarBannerActualizacion() {
    if (document.getElementById('banner-update')) return;
    const banner = document.createElement('div');
    banner.id = 'banner-update';
    banner.style.cssText = `
      position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
      background:#1e293b; color:white; padding:12px 20px;
      border-radius:14px; z-index:99999; display:flex;
      align-items:center; gap:12px; box-shadow:0 4px 20px rgba(0,0,0,0.4);
      font-family:sans-serif; font-size:14px; white-space:nowrap;
      border:1px solid rgba(255,255,255,0.1)`;
    banner.innerHTML = `
      <span>🔄 Nueva versión disponible</span>
      <button onclick="aplicarActualizacion()" style="
        background:#2563eb; color:white; border:none; border-radius:8px;
        padding:6px 14px; font-size:13px; font-weight:700; cursor:pointer">
        Actualizar
      </button>`;
    document.body.appendChild(banner);
  }

  window.aplicarActualizacion = function() {
    navigator.serviceWorker.getRegistration().then(reg => {
      if (reg && reg.waiting) {
        reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      } else {
        window.location.reload();
      }
    });
  };
</script>
